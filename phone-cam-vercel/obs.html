<!DOCTYPE html>
<html>
<head>
    <title>OBS Camera Viewer</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; }
        #status { position: fixed; top: 10px; left: 10px; color: white; background: rgba(0, 0, 0, 0.55); padding: 8px 10px; border-radius: 8px; font-family: Arial, sans-serif; font-size: 14px; z-index: 10; }
        video { width: 100vw; height: 100vh; object-fit: contain; display: block; background: transparent; }
        video.mirror { transform: scaleX(-1); }
        video.cover { object-fit: cover; }
        video.contain { object-fit: contain; }
        body.hide-status #status { display: none; }
    </style>
</head>
<body>
    <div id="status">Waiting for phone...</div>
    <video id="remoteVideo" autoplay playsinline muted></video>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/config.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);

        const room = params.get("room") || "room1";
        const mirror = params.get("mirror") === "1";
        const fit = params.get("fit") || "contain";
        const showStatus = params.get("status") !== "0";

        if (!showStatus) document.body.classList.add("hide-status");

        const socket = io(window.APP_CONFIG.SIGNAL_SERVER, { transports: ["websocket", "polling"] });

        const remoteVideo = document.getElementById("remoteVideo");
        const statusText = document.getElementById("status");

        function setStatus(text) { statusText.innerText = text; }

        if (mirror) remoteVideo.classList.add("mirror");
        if (fit === "cover") remoteVideo.classList.add("cover");
        else remoteVideo.classList.add("contain");

        let pc = new RTCPeerConnection({
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" }
            ]
        });

        socket.on("connect", () => {
            socket.emit("join", { room, role: "viewer" });
            setStatus("Connected. Waiting for phone...");
        });

        pc.ontrack = (event) => {
            remoteVideo.srcObject = event.streams[0];
            setStatus("Phone camera live");
        };

        pc.onicecandidate = (event) => {
            if (event.candidate) {
                socket.emit("ice", { room, candidate: event.candidate });
            }
        };

        socket.on("offer", async (offer) => {
            try {
                await pc.setRemoteDescription(offer);

                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                socket.emit("answer", { room, answer });
            } catch (error) {
                console.log(error);
                setStatus("Connection error");
            }
        });

        socket.on("ice", async (candidate) => {
            try { await pc.addIceCandidate(candidate); } catch (error) { console.log(error); }
        });

        socket.on("peer-disconnected", () => setStatus("Phone disconnected"));
        socket.on("disconnect", () => setStatus("Server disconnected"));
    </script>
</body>
</html>
